name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22.x'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  migrate-check:
    name: Migration Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: roomshare_migrate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - name: Install pgvector extension in PostgreSQL
        run: |
          bash .github/scripts/install-pgvector.sh
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate
      - name: Run migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roomshare_migrate_test
        run: pnpm exec prisma migrate deploy

  # Unit tests - fast, isolated tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--experimental-vm-modules --max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm jest --ci --maxWorkers=2 --coverage --testPathPatterns="src/__tests__/lib/" --testPathPatterns="src/__tests__/hooks/" --testPathIgnorePatterns="filter-regression|test-utils"
      - uses: codecov/codecov-action@v6
        if: always() && github.event_name != 'pull_request'
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # Component and page tests
  test-components:
    name: Component Tests
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--experimental-vm-modules --max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm jest --ci --testPathPatterns="src/__tests__/components/" --testPathPatterns="src/__tests__/pages/"

  # API and action tests - BLOCKING (P1-09 fix: removed continue-on-error)
  test-api:
    name: API & Action Tests
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--experimental-vm-modules --max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run API tests (excluding facets)
        run: pnpm jest --ci --maxWorkers=2 --testPathPatterns="src/__tests__/api/" --testPathIgnorePatterns="facets"
      - name: Run facets tests (memory-intensive)
        run: pnpm jest --ci --maxWorkers=1 --testPathPatterns="src/__tests__/api/search/facets/"
      - name: Run Action tests
        run: pnpm jest --ci --maxWorkers=2 --testPathPatterns="src/__tests__/actions/"

  # Filter system tests - integration, property-based, and E2E
  test-filters:
    name: Filter System Tests
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--experimental-vm-modules --max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run filter schema tests
        run: pnpm jest --ci --testPathPatterns="src/__tests__/lib/filter-schema.test.ts"
      - name: Run pairwise integration tests
        run: pnpm jest --ci --testPathPatterns="src/__tests__/integration/"
      - name: Run property-based tests
        run: pnpm jest --ci --testPathPatterns="src/__tests__/property/"
      - name: Run E2E filter tests
        run: pnpm jest --ci --testPathPatterns="src/__tests__/e2e/"

  # Filter regression validation - ensures filter behavior hasn't changed
  test-filter-regression:
    name: Filter Regression Validation
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--experimental-vm-modules --max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run regression framework tests
        run: pnpm jest --ci --testPathPatterns="src/__tests__/lib/filter-regression.test.ts"
      - name: Validate critical filter scenarios
        run: node scripts/validate-filter-scenarios.js

  # Performance and safety tests - run separately to avoid CI timeout
  test-performance:
    name: Performance & Safety Tests
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--experimental-vm-modules --max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run performance tests
        run: pnpm jest --ci --testPathPatterns="src/__tests__/performance/" --testTimeout=60000

  privacy-pii-scan:
    name: Public Payload PII Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run scan:public-payload-pii -- scripts/fixtures/public-payload-clean.json

  # E2E tests handled by separate Playwright workflows (playwright.yml, playwright-smoke.yml)

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, migrate-check, test-unit, test-components, test-api, test-filters, test-filter-regression, test-performance, privacy-pii-scan]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          # Dummy values for build-time checks (Next.js requires these at build time)
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          NEXTAUTH_SECRET: 'build-secret-dummy-value-32-chars-min'
          NEXTAUTH_URL: 'http://localhost:3000'
          GOOGLE_CLIENT_ID: 'dummy-google-client-id'
          GOOGLE_CLIENT_SECRET: 'dummy-google-client-secret'

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ always() }}
    steps:
      - name: Verify CI gate
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build gate finished with result: ${{ needs.build.result }}"
            exit 1
          fi
          echo "CI gate passed"

  # Release secrets are optional until the GitHub Actions release pipeline is
  # activated. While they are unconfigured, deploy jobs SKIP (not fail) and
  # Vercel git auto-deploy remains the release path. To activate the pipeline:
  # configure the secrets below plus PRODUCTION_MIGRATION_DATABASE_URL, then
  # disable git auto-deploy in vercel.json (see docs/DEPLOYMENT.md).
  check-release-secrets:
    name: Check release secrets
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Detect Vercel release secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          STAGING_MIGRATION_DATABASE_URL: ${{ secrets.STAGING_MIGRATION_DATABASE_URL }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$STAGING_MIGRATION_DATABASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel release secrets not configured; skipping GitHub Actions deploys (Vercel git auto-deploy remains the release path)"
          fi

  # Staging release gate: build artifact, migrate DB, then deploy.
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ci, check-release-secrets]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.check-release-secrets.outputs.configured == 'true'
    environment:
      name: staging
      url: https://staging.roomshare.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Verify staging release secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          STAGING_MIGRATION_DATABASE_URL: ${{ secrets.STAGING_MIGRATION_DATABASE_URL }}
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID STAGING_MIGRATION_DATABASE_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for staging deployment"
              missing=1
            fi
          done
          exit "$missing"
      - name: Pull Vercel staging environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=staging --token="$VERCEL_TOKEN"
      - name: Build Vercel staging artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --target=staging --token="$VERCEL_TOKEN"
      - name: Verify main is still current before staging migration
        run: |
          git fetch origin main --depth=1
          remote_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$remote_sha" ]; then
            echo "::error::Refusing to migrate staging for stale SHA $GITHUB_SHA; origin/main is $remote_sha"
            exit 1
          fi
      - name: Apply staging database migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_MIGRATION_DATABASE_URL }}
        run: pnpm exec prisma migrate deploy
      - name: Verify main is still current before staging deploy
        run: |
          git fetch origin main --depth=1
          remote_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$remote_sha" ]; then
            echo "::error::Refusing to deploy staging for stale SHA $GITHUB_SHA; origin/main is $remote_sha"
            exit 1
          fi
      - name: Deploy staging prebuilt artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --target=staging --archive=tgz --token="$VERCEL_TOKEN"

  # Production release gate: staging must succeed before production approval.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://roomshare.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Verify production release secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PRODUCTION_MIGRATION_DATABASE_URL: ${{ secrets.PRODUCTION_MIGRATION_DATABASE_URL }}
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID PRODUCTION_MIGRATION_DATABASE_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for production deployment"
              missing=1
            fi
          done
          exit "$missing"
      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build Vercel production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Verify main is still current before production migration
        run: |
          git fetch origin main --depth=1
          remote_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$remote_sha" ]; then
            echo "::error::Refusing to migrate production for stale SHA $GITHUB_SHA; origin/main is $remote_sha"
            exit 1
          fi
      - name: Apply production database migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_MIGRATION_DATABASE_URL }}
        run: pnpm exec prisma migrate deploy
      - name: Verify main is still current before production deploy
        run: |
          git fetch origin main --depth=1
          remote_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$remote_sha" ]; then
            echo "::error::Refusing to deploy production for stale SHA $GITHUB_SHA; origin/main is $remote_sha"
            exit 1
          fi
      - name: Deploy production prebuilt artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
