name: Stability Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: stability-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  stability-e2e:
    name: Stability E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: roomshare
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5433/roomshare?schema=public
      NEXTAUTH_SECRET: ci-test-secret-at-least-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: 'true'
      # NOTE: E2E_BASE_URL intentionally NOT set — lets playwright.config.ts
      # start the dev server automatically via its webServer config
      E2E_TEST_EMAIL: test@example.com
      E2E_TEST_PASSWORD: TestPassword123!
      E2E_DISABLE_RATE_LIMIT: 'true'
      E2E_TEST_HELPERS: 'true'
      E2E_TEST_SECRET: 'ci-e2e-test-secret-minimum-16-chars'
      ENABLE_MULTI_SLOT_BOOKING: 'true'
      ENABLE_WHOLE_UNIT_MODE: 'true'
      ENABLE_SOFT_HOLDS: 'on'
      ENABLE_BOOKING_AUDIT: 'true'
      CRON_SECRET: 'ci-stability-cron-secret'
      NODE_OPTIONS: '--max-old-space-size=4096'
      CI: 'true'
      GOOGLE_CLIENT_ID: 'ci-placeholder-not-used-in-tests'
      GOOGLE_CLIENT_SECRET: 'ci-placeholder-not-used-in-tests'
      TURNSTILE_ENABLED: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Install pgvector extension in PostgreSQL
        run: |
          CONTAINER_ID=$(docker ps -q --filter "ancestor=postgis/postgis:16-3.4")
          docker exec "$CONTAINER_ID" bash -c "apt-get update && apt-get install -y postgresql-16-pgvector && rm -rf /var/lib/apt/lists/*"

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client and run migrations
        run: pnpm exec prisma generate && pnpm exec prisma migrate deploy

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run stability E2E tests
        run: |
          pnpm exec playwright test \
            tests/e2e/stability/ \
            --project=chromium \
            --workers=1 \
            --reporter=list,html

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: stability-test-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stability-test-failures
          path: test-results/
          retention-days: 7
