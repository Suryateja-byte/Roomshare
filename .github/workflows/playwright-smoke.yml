name: Playwright Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  smoke:
    name: Search Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: roomshare
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      DATABASE_URL: postgresql://postgres:password@localhost:5433/roomshare?schema=public
      NEXTAUTH_SECRET: ci-test-secret-at-least-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: 'true'
      # Fix 5: Use 127.0.0.1 to avoid IPv6 resolution issues
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_TEST_EMAIL: test@example.com
      E2E_TEST_PASSWORD: TestPassword123!
      E2E_DISABLE_RATE_LIMIT: 'true'
      CI: 'true'
      GOOGLE_CLIENT_ID: 'ci-placeholder-not-used-in-tests'
      GOOGLE_CLIENT_SECRET: 'ci-placeholder-not-used-in-tests'
      TURNSTILE_ENABLED: 'false'
      # FLAKE-004: Skip globalSetup seed — CI already seeds in an explicit step above
      SKIP_E2E_SEED: 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Install pgvector extension in PostgreSQL
        run: |
          CONTAINER_ID=$(docker ps -q --filter "ancestor=postgis/postgis:16-3.4")
          docker exec "$CONTAINER_ID" bash -c "apt-get update && apt-get install -y postgresql-16-pgvector && rm -rf /var/lib/apt/lists/*"

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client and run migrations
        run: pnpm exec prisma generate && pnpm exec prisma migrate deploy

      - name: Seed E2E test data
        run: pnpm run seed:e2e

      # Fix 2: Include Playwright version in cache key
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Fix 1: Build production bundle for faster, reliable tests
      - name: Build Next.js production bundle
        run: pnpm run build

      - name: Start production server
        run: |
          pnpm run start &
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:3000/api/health/ready; do sleep 1; done'
          echo "Server ready"

      - name: Run smoke tests
        run: pnpm exec playwright test tests/e2e/search-smoke.spec.ts --project=chromium

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
